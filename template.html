<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{DATE_TITLE}}</title>
</head>
<body style="margin:0; padding:0; background:#ffffff; font-family:'Pretendard Variable', Pretendard, -apple-system, system-ui, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size:16px; line-height:1.6; color:#393632;">
<div style="max-width:640px; margin:0 auto; background:#ffffff;">

  <!-- 상단 액센트 바 (surface.base) -->
  <div style="height:4px; line-height:4px; font-size:0; background:#000000;">&nbsp;</div>

  <div style="padding:0 28px;">

    <!-- 마스트헤드 -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse; margin-top:16px;">
      <tr>
        <td style="padding:0 0 12px 0; border-bottom:1px solid #c9c6ba; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#8b8b73;">STOCK DAILY</td>
        <td style="padding:0 0 12px 0; border-bottom:1px solid #c9c6ba; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#8b8b73; text-align:right;">평일 오전 8시 발행</td>
      </tr>
    </table>

    <!-- 타이틀 -->
    <div style="padding:28px 0 0 0;">
      <p style="margin:0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#d2462f;">데일리 시황 브리핑</p>
      <h1 style="margin:12px 0 0 0; font-size:20px; font-weight:800; letter-spacing:-0.01em; line-height:1.3; color:#18181b;">{{DATE_TITLE}}</h1>
      <div style="margin-top:16px; border-top:2px solid #18181b; font-size:0; line-height:0;">&nbsp;</div>
    </div>

    <!-- 오늘의 3줄 -->
    <div style="padding:28px 0 0 0;">
      <p style="margin:0 0 16px 0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#d2462f;">오늘의 3줄</p>
      {{THREE_LINES}}
    </div>

    <!-- 시장 지표 -->
    <div style="padding:32px 0 0 0; margin-top:32px; border-top:1px solid #c9c6ba;">
      <p style="margin:0 0 16px 0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#8b8b73;">시장 지표</p>
      {{INDICATORS}}
    </div>

    <!-- 국내 증시 -->
    <div style="padding:32px 0 0 0; margin-top:32px; border-top:1px solid #c9c6ba;">
      <h2 style="margin:0; font-size:19px; font-weight:800; letter-spacing:-0.01em; color:#18181b;">국내 증시</h2>
      <p style="margin:6px 0 0 0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#8b8b73;">코스피 · 코스닥 브리핑</p>
      <div style="margin-top:16px; border-top:1px solid #c9c6ba; font-size:0; line-height:0;">&nbsp;</div>
      {{KR_SECTIONS}}
    </div>

    <!-- 미국 증시 -->
    <div style="padding:32px 0 0 0; margin-top:32px; border-top:1px solid #c9c6ba;">
      <h2 style="margin:0; font-size:19px; font-weight:800; letter-spacing:-0.01em; color:#18181b;">미국 증시</h2>
      <p style="margin:6px 0 0 0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#8b8b73;">나스닥 · S&amp;P · 다우 브리핑</p>
      <div style="margin-top:16px; border-top:1px solid #c9c6ba; font-size:0; line-height:0;">&nbsp;</div>
      {{US_SECTIONS}}
    </div>

    <!-- 오늘의 일정 -->
    <div style="padding:32px 0 0 0; margin-top:32px; border-top:1px solid #c9c6ba;">
      <p style="margin:0 0 16px 0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#8b8b73;">오늘의 일정</p>
      {{CALENDAR}}
    </div>

  </div>

  <!-- 참고 링크 (원문 영어) — surface.muted 대역, 유일한 박스형 요소 -->
  <div style="margin-top:32px; padding:24px 28px; background:#f5f5f2;">
    <p style="margin:0 0 12px 0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#8b8b73;">참고 링크 (원문 영어)</p>
    {{US_REFS}}
  </div>

  <div style="padding:0 28px;">
    <!-- 푸터 -->
    <div style="margin-top:40px; padding:28px 0 40px 0; border-top:2px solid #18181b;">
      <p style="margin:0 0 6px 0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#8b8b73;">주식 데일리 · 평일 오전 8시 발송</p>
      <p style="margin:0; font-family:'SF Mono', Menlo, Consolas, monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:#8b8b73;">본 뉴스레터는 정보 제공 목적이며 투자 조언이 아닙니다</p>
    </div>
  </div>

</div>
</body>
</html>
