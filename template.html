<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{DATE_TITLE}}</title>
</head>
<body style="margin:0; padding:0; background:#f5f6f7; font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
<div style="max-width:640px; margin:0 auto; padding:20px 16px;">

  <!-- 헤더 -->
  <div style="background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); border-radius:16px; padding:32px 28px; margin-bottom:20px; text-align:center;">
    <div style="font-size:12px; color:#a0b4c8; letter-spacing:3px; text-transform:uppercase; margin-bottom:8px;">STOCK DAILY</div>
    <h1 style="margin:0; color:#ffffff; font-size:24px; font-weight:700;">{{DATE_TITLE}}</h1>
  </div>

  <!-- 📌 오늘의 3줄 -->
  <div style="background:#ffffff; border-radius:12px; padding:24px; margin-bottom:20px; border:1px solid #e8e8e8;">
    <h2 style="margin:0 0 16px 0; font-size:15px; color:#dc2626; font-weight:600; letter-spacing:0.5px;">📌 오늘의 3줄</h2>
    {{THREE_LINES}}
  </div>

  <!-- 📊 시장 지표 대시보드 -->
  <div style="background:#ffffff; border-radius:12px; padding:24px; margin-bottom:20px; border:1px solid #e8e8e8;">
    <h2 style="margin:0 0 14px 0; font-size:15px; color:#334155; font-weight:600; letter-spacing:0.5px;">📊 시장 지표 대시보드</h2>
    {{INDICATORS}}
  </div>

  <!-- 🇰🇷 국내 증시 -->
  <div style="margin-bottom:8px;">
    <h2 style="margin:0 0 14px 0; font-size:17px; color:#1f2937; font-weight:700;">🇰🇷 국내 증시</h2>
    {{KR_SECTIONS}}
  </div>

  <!-- 🇺🇸 미국 증시 -->
  <div style="margin-bottom:8px;">
    <h2 style="margin:0 0 14px 0; font-size:17px; color:#1f2937; font-weight:700;">🇺🇸 미국 증시</h2>
    {{US_SECTIONS}}
  </div>

  <!-- 📅 오늘의 일정 -->
  <div style="background:#ffffff; border-radius:12px; padding:24px; margin-bottom:20px; border:1px solid #e8e8e8;">
    <h2 style="margin:0 0 14px 0; font-size:15px; color:#334155; font-weight:600; letter-spacing:0.5px;">📅 오늘의 일정</h2>
    {{CALENDAR}}
  </div>

  <!-- 📎 참고 링크 (원문 영어) -->
  <div style="background:#f8fafc; border-radius:12px; padding:20px 24px; margin-bottom:20px; border:1px solid #e8e8e8;">
    <h2 style="margin:0 0 12px 0; font-size:13px; color:#94a3b8; font-weight:600; letter-spacing:0.5px;">📎 참고 링크 (원문 영어)</h2>
    {{US_REFS}}
  </div>

  <!-- 푸터 -->
  <div style="text-align:center; padding:20px 12px 8px 12px; color:#94a3b8; font-size:12px;">
    <p style="margin:0 0 4px 0;">주식 데일리 · 평일 오전 8시 발송</p>
    <p style="margin:0;">본 뉴스레터는 정보 제공 목적이며 투자 조언이 아닙니다.</p>
  </div>

</div>
</body>
</html>
